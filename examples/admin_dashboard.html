<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2f3336;
        }
        .header h1 {
            font-size: 24px;
            color: #00d9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span { font-size: 28px; }
        .stats-bar {
            display: flex;
            gap: 30px;
            padding: 20px 30px;
            background: #16181c;
            border-bottom: 1px solid #2f3336;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-label {
            font-size: 12px;
            color: #71767b;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .stat-value.green { color: #00ff88; }
        .stat-value.orange { color: #ffa502; }
        .stat-value.red { color: #ff4757; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 180px);
        }
        .panel {
            background: #16181c;
            border-radius: 12px;
            border: 1px solid #2f3336;
            overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px;
            background: #1d1f23;
            border-bottom: 1px solid #2f3336;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #e7e9ea;
        }
        .panel-content {
            padding: 15px;
            height: calc(100% - 50px);
            overflow-y: auto;
        }
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .task-item {
            background: #1d1f23;
            border-radius: 8px;
            padding: 12px 15px;
            border-left: 4px solid;
            cursor: pointer;
            transition: background 0.2s;
        }
        .task-item:hover { background: #222325; }
        .task-item.completed { border-color: #00ff88; }
        .task-item.failed { border-color: #ff4757; }
        .task-item.pending { border-color: #ffa502; }
        .task-item.running { border-color: #00d9ff; }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .task-type {
            font-size: 11px;
            color: #00d9ff;
            text-transform: uppercase;
            font-weight: 600;
        }
        .task-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .task-status.completed { background: #00ff8833; color: #00ff88; }
        .task-status.failed { background: #ff475733; color: #ff4757; }
        .task-status.pending { background: #ffa50233; color: #ffa502; }
        .task-status.running { background: #00d9ff33; color: #00d9ff; }
        .task-id {
            font-size: 11px;
            color: #71767b;
            font-family: monospace;
        }
        .worker-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .worker-item {
            background: #1d1f23;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .worker-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .worker-info { flex: 1; }
        .worker-name {
            font-size: 14px;
            font-weight: 600;
            color: #e7e9ea;
        }
        .worker-type {
            font-size: 11px;
            color: #71767b;
        }
        .worker-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .worker-status.online { background: #00ff88; }
        .worker-status.busy { background: #ffa502; }
        .worker-status.offline { background: #71767b; }
        .action-bar {
            padding: 15px 20px;
            background: #16181c;
            border-top: 1px solid #2f3336;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #00d9ff;
            color: #000;
        }
        .btn-primary:hover { background: #00b8d9; }
        .btn-secondary {
            background: #2f3336;
            color: #e7e9ea;
        }
        .btn-secondary:hover { background: #3f4246; }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #71767b;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #1d1f23;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #e7e9ea;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        .console {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .console-line {
            color: #71767b;
            margin: 4px 0;
        }
        .console-line.success { color: #00ff88; }
        .console-line.error { color: #ff4757; }
        .console-line.info { color: #00d9ff; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>🤖</span> Multi-Agent Admin Dashboard</h1>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="stat-workers">0</div>
            <div class="stat-label">Workers</div>
        </div>
        <div class="stat">
            <div class="stat-value green" id="stat-online">0</div>
            <div class="stat-label">Online</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="stat-tasks">0</div>
            <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat">
            <div class="stat-value green" id="stat-completed">0</div>
            <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
            <div class="stat-value red" id="stat-failed">0</div>
            <div class="stat-label">Failed</div>
        </div>
        <div class="stat">
            <div class="stat-value orange" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="panel" style="height: 100%; display: flex; flex-direction: column;">
                <div class="panel-header">
                    <span class="panel-title">📋 Task Management</span>
                </div>
                <div class="panel-content">
                    <div class="task-list" id="task-list">
                        <div style="text-align: center; color: #71767b; padding: 40px;">
                            No tasks yet. Submit your first task below.
                        </div>
                    </div>
                </div>
                <div class="action-bar">
                    <button class="btn btn-primary" onclick="showSubmitModal()">+ Submit Task</button>
                    <button class="btn btn-secondary" onclick="refreshData()" style="margin-left: 10px;">↻ Refresh</button>
                </div>
            </div>
        </div>

        <div class="right-panel" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">👥 Workers</span>
                </div>
                <div class="panel-content">
                    <div class="worker-list" id="worker-list">
                        <div style="text-align: center; color: #71767b; padding: 20px;">
                            No workers registered.
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-header">
                    <span class="panel-title">📊 System Console</span>
                </div>
                <div class="panel-content">
                    <div class="console" id="console">
                        <div class="console-line info">System initialized...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Submit Task Modal -->
    <div id="submit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #16181c; border-radius: 12px; padding: 30px; width: 450px; border: 1px solid #2f3336;">
            <h2 style="color: #00d9ff; margin-bottom: 20px;">Submit New Task</h2>
            <div class="form-group">
                <label>Task Type</label>
                <select id="task-type">
                    <option value="analysis">Analysis</option>
                    <option value="research">Research</option>
                    <option value="coding">Coding</option>
                    <option value="design">Design</option>
                    <option value="data">Data</option>
                </select>
            </div>
            <div class="form-group">
                <label>Query / Task Data</label>
                <input type="text" id="task-query" placeholder="Enter task query...">
            </div>
            <div class="form-group">
                <label>Timeout (seconds)</label>
                <input type="number" id="task-timeout" value="300" min="10" max="3600">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="submitTask()">Submit</button>
                <button class="btn btn-secondary" onclick="hideSubmitModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let lastUpdate = Date.now();

        async function refreshData() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Update stats
                const workers = data.workers || [];
                const tasks = data.tasks || {};

                const online = workers.filter(w => w.status === 'online' || w.status === 'busy').length;
                const completed = workers.reduce((s, w) => s + w.completed, 0);
                const failed = workers.reduce((s, w) => s + w.failed, 0);
                const taskList = Object.values(tasks);
                const pending = taskList.filter(t => t.status === 'pending' || t.status === 'running').length;

                document.getElementById('stat-workers').textContent = workers.length;
                document.getElementById('stat-online').textContent = online;
                document.getElementById('stat-tasks').textContent = taskList.length;
                document.getElementById('stat-completed').textContent = completed;
                document.getElementById('stat-failed').textContent = failed;
                document.getElementById('stat-pending').textContent = pending;

                // Update task list
                const taskListEl = document.getElementById('task-list');
                if (taskList.length === 0) {
                    taskListEl.innerHTML = '<div style="text-align: center; color: #71767b; padding: 40px;">No tasks yet.</div>';
                } else {
                    taskListEl.innerHTML = taskList.slice(-10).reverse().map(t => `
                        <div class="task-item ${t.status}">
                            <div class="task-header">
                                <span class="task-type">${t.task_type || 'unknown'}</span>
                                <span class="task-status ${t.status}">${t.status}</span>
                            </div>
                            <div class="task-id">#${t.task_id ? t.task_id.substring(0, 8) : 'unknown'}</div>
                        </div>
                    `).join('');
                }

                // Update worker list
                const workerListEl = document.getElementById('worker-list');
                if (workers.length === 0) {
                    workerListEl.innerHTML = '<div style="text-align: center; color: #71767b; padding: 20px;">No workers.</div>';
                } else {
                    const colors = ['#00d9ff', '#ff6b6b', '#4ecdc4', '#ffa502', '#9b59b6', '#e74c3c', '#2ecc71'];
                    workerListEl.innerHTML = workers.map((w, i) => `
                        <div class="worker-item">
                            <div class="worker-avatar" style="background: ${colors[i % colors.length]}22; color: ${colors[i % colors.length]}">
                                🤖
                            </div>
                            <div class="worker-info">
                                <div class="worker-name">${w.worker_id}</div>
                                <div class="worker-type">${w.worker_type || 'general'} • ${w.completed} completed</div>
                            </div>
                            <div class="worker-status ${w.status}"></div>
                        </div>
                    `).join('');
                }

                logConsole('info', 'Data refreshed');

            } catch (e) {
                logConsole('error', 'Failed to fetch data: ' + e.message);
            }
        }

        function showSubmitModal() {
            document.getElementById('submit-modal').style.display = 'flex';
        }

        function hideSubmitModal() {
            document.getElementById('submit-modal').style.display = 'none';
        }

        async function submitTask() {
            const taskType = document.getElementById('task-type').value;
            const query = document.getElementById('task-query').value;
            const timeout = parseInt(document.getElementById('task-timeout').value) || 300;

            try {
                const res = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_type: taskType,
                        task_data: { query: query },
                        timeout: timeout
                    })
                });
                const data = await res.json();

                if (data.task_id) {
                    logConsole('success', `Task submitted: ${data.task_id.substring(0, 8)}... (${taskType})`);
                    hideSubmitModal();
                    refreshData();
                } else {
                    logConsole('error', 'Failed to submit task');
                }
            } catch (e) {
                logConsole('error', 'Error: ' + e.message);
            }
        }

        function logConsole(type, message) {
            const console = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = `[${time}] ${message}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        // Initial load and periodic refresh
        refreshData();
        setInterval(refreshData, 3000);
    </script>
</body>
</html>
